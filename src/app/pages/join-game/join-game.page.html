<ion-header [translucent]="true">
<ion-toolbar color="primary">
  <ion-title>
    <div style="text-align: center;">
      
      <div>My Kahoot</div>
      <div style="font-size: 0.85em; font-weight: normal; opacity: 0.85;">
        Join Game
      </div>
    </div>
  </ion-title>
</ion-toolbar>

</ion-header>


<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Join Game</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-item>
    <ion-input
      label="Entry Code"
      labelPlacement="floating"
      [(ngModel)]="entryCode"
      placeholder="Enter 6-digit code"
      type="text"
      maxlength="6"
    ></ion-input>
  </ion-item>

  <ion-button
    expand="block"
    class="ion-margin-top"
    (click)="joinGame()"
    [disabled]="!entryCode.trim()"
  >
    Join
  </ion-button>

  @if (error) {
    <p
      class="ion-text-center"
      style="color: var(--ion-color-danger); margin-top: 16px;"
    >
      {{ error }}
    </p>
  }
</ion-content>
