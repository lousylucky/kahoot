<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>
      <div style="text-align: center;">
        <div style="font-size: 1.2em; font-weight: bold;">My Kahoot</div>
      </div>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="join-content">
  <div class="join-wrapper">

    <!-- ── Brand ── -->
    <div class="brand">
      <div class="brand-icon">🎮</div>
      <h1 class="brand-name">Join a Game</h1>
      <p class="brand-sub">Enter the 6-digit code to join</p>
    </div>

    <!-- ── Code card ── -->
    <div class="join-card">
      <div class="field-group">
        <label class="field-label">Entry Code</label>
        <ion-item class="field-item" lines="none">
          <ion-input
            [(ngModel)]="entryCode"
            placeholder="000000"
            type="text"
            maxlength="6"
            class="code-input"
          ></ion-input>
        </ion-item>
      </div>

      @if (error) {
        <div class="error-container">
          <p class="error-text">{{ error }}</p>
        </div>
      }

      <ion-button
        expand="block"
        class="join-btn"
        (click)="joinGame()"
        [disabled]="!entryCode.trim()"
      >
        Join Game
      </ion-button>
    </div>

  </div>
</ion-content>
