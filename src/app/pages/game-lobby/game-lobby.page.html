<ion-header [translucent]="true">
    <ion-toolbar class="app-header">
      <ion-button slot="start" fill="clear" (click)="goBack()">
        <ion-icon slot="icon-only" name="chevron-back"></ion-icon>
      </ion-button>
      <ion-title>Game Lobby</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content [fullscreen]="true" class="ion-text-center ion-padding">
    @if (game(); as g) {
      <div class="lobby-container">
        <div class="entry-code-section">
          <p class="label">Entry Code</p>
          <h1 class="entry-code">{{ g.entryCode }}</h1>
          @if (qrDataUrl()) {
            <img [src]="qrDataUrl()" alt="QR Code" class="qr-code" />
            <p class="qr-hint">Scan to join</p>
          }
        </div>

        <div class="players-section">
          <ion-badge color="primary">{{ g.players.length }} player(s)</ion-badge>
        </div>

        <p class="status-text">Waiting for other players...</p>

        @if (isAdmin) {
          <ion-button expand="block" size="large" class="start-btn" (click)="startGame()">
            Start Game
          </ion-button>
        } @else {
          <p class="waiting-admin">Waiting for admin to start the game...</p>
        }

        <ion-button expand="block" fill="outline" color="danger" class="leave-btn" (click)="goBack()">
          Leave Lobby
        </ion-button>
      </div>
    } @else {
      <ion-spinner name="crescent"></ion-spinner>
    }
</ion-content>
